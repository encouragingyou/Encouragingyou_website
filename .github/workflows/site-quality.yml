name: Site Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: site-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  blocking:
    name: Blocking Quality Gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DEPLOYMENT_SURFACE: public
      PLAYWRIGHT_DEPLOYMENT_SURFACE: public
      ADMIN_PORTAL_ENABLED: "false"
    defaults:
      run:
        working-directory: site
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: site/.nvmrc
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run blocking quality pipeline
        run: npm run ci:public

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: public-playwright-artifacts
          path: site/output/playwright
          retention-days: 14

  advisory:
    name: Advisory Dependency Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    defaults:
      run:
        working-directory: site
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: site/.nvmrc
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run advisory audit
        run: npm run audit:policy
